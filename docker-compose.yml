version: '3.8'
services:
  frontend:
    build:
      context: ./portfolio
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./portfolio:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host
